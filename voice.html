<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Voz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); } 100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
        .speaking { animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[100px]"></div>
    </div>

    <div class="absolute top-6 left-6 z-20 flex items-center gap-4">
        <button onclick="window.location.href='index.html'" class="bg-white/10 hover:bg-white/20 p-3 rounded-full backdrop-blur-sm transition-all"><i class="fa-solid fa-arrow-left text-white"></i></button>
        <div><h2 id="bot-name" class="text-xl font-bold">Bot</h2><p id="status-text" class="text-sm text-indigo-300">Esperando...</p></div>
    </div>

    <div class="z-10 flex flex-col items-center gap-12 w-full max-w-md px-6">
        <div class="relative">
            <div id="visualizer-ring" class="absolute inset-0 rounded-full bg-indigo-500 opacity-20 blur-xl transition-all duration-300"></div>
            <div id="bot-avatar" class="w-40 h-40 rounded-full bg-slate-800 border-4 border-indigo-500/50 flex items-center justify-center overflow-hidden relative z-10 shadow-2xl">
                <i class="fa-solid fa-robot text-6xl text-slate-600"></i>
            </div>
        </div>
        <div class="w-full text-center space-y-4 min-h-[100px]">
            <p id="user-text" class="text-lg text-gray-300 italic opacity-0 transition-opacity duration-500">"..."</p>
            <p id="bot-text" class="text-xl font-medium text-white transition-all duration-300"></p>
        </div>
        <button id="mic-btn" onclick="toggleListening()" class="w-20 h-20 rounded-full bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/30 transition-all transform hover:scale-105 relative">
            <div id="mic-pulse" class="absolute inset-0 rounded-full bg-indigo-400 opacity-0"></div>
            <i id="mic-icon" class="fa-solid fa-microphone text-3xl text-white"></i>
        </button>
        <p class="text-xs text-gray-500">Toca para hablar</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBs4OlJjJ14WPTQ3u-7VkOjgLKCKQypmTI",
          authDomain: "aiportal-ce688.firebaseapp.com",
          databaseURL: "https://aiportal-ce688-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "aiportal-ce688",
          storageBucket: "aiportal-ce688.firebasestorage.app",
          messagingSenderId: "217019276864",
          appId: "1:217019276864:web:572d05413bd4ce5fc209a5",
          measurementId: "G-2XKQPLBHN4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "aiportal-ce688";
        const mistralApiKey = "mjVkbhVGVY43LJNMttSLDYOFSYFSkOuv";

        let currentBot = null;
        let recognition = null;
        let isListening = false;
        let chatHistory = [];
        let currentUser = null;

        window.onload = () => {
            const botData = localStorage.getItem('aiportal_current_bot');
            if (!botData) { window.location.href = 'index.html'; return; }
            currentBot = JSON.parse(botData);
            
            document.getElementById('bot-name').innerText = currentBot.name;
            const avatarContainer = document.getElementById('bot-avatar');
            if (currentBot.avatar && !currentBot.avatar.startsWith('http')) avatarContainer.innerHTML = `<span class="text-6xl">${currentBot.avatar}</span>`;
            else if (currentBot.avatar) avatarContainer.innerHTML = `<img src="${currentBot.avatar}" class="w-full h-full object-cover">`;

            onAuthStateChanged(auth, (user) => { if (user) currentUser = user; else window.location.href = 'index.html'; });

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.onstart = () => { isListening = true; updateUIState('listening'); };
                recognition.onend = () => { isListening = false; if (document.getElementById('status-text').innerText === 'Escuchando...') updateUIState('idle'); };
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('user-text').innerText = `"${transcript}"`;
                    document.getElementById('user-text').classList.remove('opacity-0');
                    processInput(transcript);
                };
            } else { alert("Tu navegador no soporta voz."); }
        };

        window.toggleListening = () => { if (!recognition) return; if (isListening) recognition.stop(); else recognition.start(); };

        function updateUIState(state) {
            const statusText = document.getElementById('status-text');
            const micPulse = document.getElementById('mic-pulse');
            const ring = document.getElementById('visualizer-ring');
            if (state === 'listening') { statusText.innerText = "Escuchando..."; micPulse.classList.add('pulse-ring', 'opacity-100'); ring.classList.add('scale-110'); }
            else if (state === 'thinking') { statusText.innerText = "Pensando..."; micPulse.classList.remove('pulse-ring', 'opacity-100'); ring.classList.add('animate-spin'); }
            else if (state === 'speaking') { statusText.innerText = "Hablando..."; ring.classList.remove('animate-spin'); ring.classList.add('scale-125', 'opacity-50'); }
            else { statusText.innerText = "Toca para hablar"; micPulse.classList.remove('pulse-ring', 'opacity-100'); ring.classList.remove('scale-110', 'scale-125', 'animate-spin', 'opacity-50'); }
        }

        async function processInput(text) {
            updateUIState('thinking');
            chatHistory.push({ role: "user", content: text });
            try {
                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${mistralApiKey}` },
                    body: JSON.stringify({ model: "mistral-medium-latest", messages: [{ role: "system", content: "Responde brevemente. " + currentBot.systemPrompt }, ...chatHistory] })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: aiText });
                document.getElementById('bot-text').innerText = aiText;
                
                if (currentUser) {
                    const words = aiText.split(/\s+/).length;
                    const userStatsRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'stats');
                    updateDoc(userStatsRef, { coins: increment(words) });
                }
                await speak(aiText);
            } catch (e) { console.error(e); document.getElementById('bot-text').innerText = "Error."; updateUIState('idle'); }
        }

        async function speak(text) {
            updateUIState('speaking');
            const url = `https://tts.arielcapdevilagarcia.workers.dev/?text=${encodeURIComponent(text)}&voice=onyx`;
            const audio = new Audio(url);
            audio.onended = () => {
                updateUIState('idle');
                // Automatically listen again after speaking finishes
                if (recognition) {
                    setTimeout(() => {
                        try {
                            recognition.start();
                        } catch (e) {
                            console.log("Recognition already started or failed to restart", e);
                        }
                    }, 500); // Small delay to prevent immediate cut-off or echo
                }
            };
            try { await audio.play(); } catch (e) { updateUIState('idle'); }
        }
    </script>
</body>
</html>
